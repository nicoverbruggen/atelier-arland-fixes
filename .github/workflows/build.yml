name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-dlls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64 g++-mingw-w64-i686 meson ninja-build
      - run: meson setup build64 --cross-file build-win64.txt --buildtype release
      - run: ninja -C build64
      - run: meson setup build32 --cross-file build-win32.txt --buildtype release
      - run: ninja -C build32
      - uses: actions/upload-artifact@v4
        with:
          name: atelier-arland-fixes
          path: |
            build64/d3d11.dll
            build32/msimg32.dll
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk -v heading="## ${GITHUB_REF_NAME}" '
            $0 == heading { found = 1; next }
            found && /^## v/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --notes-file release-notes.md
            gh release upload "${GITHUB_REF_NAME}" build64/d3d11.dll build32/msimg32.dll --clobber
          else
            gh release create "${GITHUB_REF_NAME}" build64/d3d11.dll build32/msimg32.dll --verify-tag --notes-file release-notes.md --title "Atelier Arland Fixes ${GITHUB_REF_NAME}"
          fi
